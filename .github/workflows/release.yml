# CI generated by cargo-dist configuration in Cargo.toml
# To regenerate: cargo dist generate-ci
#
# This workflow builds release binaries for tagged versions.

name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  plan:
    name: Plan release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Extract tag
        id: tag
        run: |
          echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: plan
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-22.04
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-22.04
            cross: true
            musl: true

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --version 0.2.5

      - name: Install musl tools
        if: matrix.musl && !matrix.cross
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../spr-${{ needs.plan.outputs.version }}-${{ matrix.target }}.tar.gz spr
          cd ../../..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: spr-${{ matrix.target }}
          path: spr-*.tar.gz

  release:
    name: Create release
    needs: [plan, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate shell installer
        run: |
          cat > artifacts/install.sh << 'INSTALLER'
          #!/bin/sh
          set -e
          REPO="mechanai/spr"
          BINARY="spr"

          OS=$(uname -s | tr '[:upper:]' '[:lower:]')
          ARCH=$(uname -m)
          case "$ARCH" in
            x86_64|amd64) ARCH="x86_64" ;;
            arm64|aarch64) ARCH="aarch64" ;;
            *) echo "Unsupported architecture: $ARCH"; exit 1 ;;
          esac

          case "$OS" in
            linux) TARGET="${ARCH}-unknown-linux-gnu" ;;
            darwin) TARGET="${ARCH}-apple-darwin" ;;
            *) echo "Unsupported OS: $OS"; exit 1 ;;
          esac

          VERSION="${1:-latest}"
          if [ "$VERSION" = "latest" ]; then
            DOWNLOAD_URL="https://github.com/$REPO/releases/latest/download/spr-${TARGET}.tar.gz"
          else
            DOWNLOAD_URL="https://github.com/$REPO/releases/download/v${VERSION}/spr-${VERSION}-${TARGET}.tar.gz"
          fi

          INSTALL_DIR="${INSTALL_DIR:-/usr/local/bin}"
          echo "Installing $BINARY to $INSTALL_DIR..."
          curl -fsSL "$DOWNLOAD_URL" | tar xz -C "$INSTALL_DIR"
          echo "$BINARY installed to $INSTALL_DIR/$BINARY"
          INSTALLER
          chmod +x artifacts/install.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(needs.plan.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            artifacts/spr-*.tar.gz
            artifacts/install.sh
